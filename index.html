<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drone Explorer — Taz Drone Solutions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07090f;
      --surface:  #0e1017;
      --border:   #1a1f2e;
      --accent:   #c8f135;
      --accent2:  #4a6cf7;
      --text:     #eef0f6;
      --muted:    #5a6070;
      --panel-w:  340px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 58px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 50;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }
    .brand-sub {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }
    .header-right {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .header-right span { color: var(--accent); margin-right: 6px; }

    .layout {
      display: flex;
      height: calc(100vh - 58px);
    }

    .carousel-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .drone-track {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
      height: 440px;
    }

    .drone-card {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .drone-card.pos-center { transform: translateX(0) scale(1); opacity: 1; z-index: 3; }
    .drone-card.pos-left   { transform: translateX(-260px) scale(0.62); opacity: 0.35; z-index: 1; }
    .drone-card.pos-right  { transform: translateX(260px) scale(0.62); opacity: 0.35; z-index: 1; }
    .drone-card.pos-hidden { transform: translateX(0) scale(0.4); opacity: 0; z-index: 0; pointer-events: none; }

    .drone-card:hover.pos-left,
    .drone-card:hover.pos-right { opacity: 0.6; }

    .drone-img-wrap {
      width: 408px;
      height: 336px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drone-img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: invert(1) brightness(0.9);
      pointer-events: none;
    }
    .drone-card.pos-center .drone-img-wrap img { filter: invert(1) brightness(1); }

    .drone-placeholder {
      width: 312px; height: 240px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }
    .drone-placeholder p {
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.1em;
    }

    .drone-label { margin-top: 16px; text-align: center; }
    .drone-label-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      transition: color 0.3s ease;
    }
    .drone-card.pos-center .drone-label-name { color: var(--accent); }
    .drone-label-type {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .drone-card.pos-center::after {
      content: '';
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      margin: 10px auto 0;
    }

    .nav-arrows { display: flex; gap: 12px; margin-top: 32px; }
    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      font-size: 1rem;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,241,53,0.06); }

    .dot-indicators { display: flex; gap: 8px; margin-top: 16px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      width: 20px;
      border-radius: 3px;
    }

    /* SPEC PANEL */
    .spec-panel {
      width: var(--panel-w);
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-top {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .panel-drone-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
    }
    .panel-drone-class {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.08em;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 22px 28px;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); }

    .panel-desc {
      font-size: 0.84rem;
      line-height: 1.75;
      color: #8890a0;
      margin-bottom: 24px;
    }

    .spec-group-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .spec-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
    }
    .spec-item-label {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .spec-item-value {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .detail-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 18px;
      background: rgba(200,241,53,0.07);
      border: 1px solid rgba(200,241,53,0.25);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .detail-btn:hover { background: rgba(200,241,53,0.13); border-color: var(--accent); }

    .panel-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      padding: 30px;
      text-align: center;
    }
    .panel-empty p { font-size: 0.8rem; line-height: 1.6; }

    #panelData { display: none; flex-direction: column; height: 100%; }

    @media (max-width: 800px) {
      html, body { overflow: auto; }
      .layout { flex-direction: column; height: auto; }
      .spec-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      header { padding: 0 20px; }
      .drone-card.pos-left  { transform: translateX(-160px) scale(0.55); }
      .drone-card.pos-right { transform: translateX(160px) scale(0.55); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="brand-name">Drone Explorer</div>
    <div class="brand-sub">Taz Drone Solutions</div>
  </div>
  <div class="header-right"><span>●</span> Pilih drone untuk eksplorasi</div>
</header>

<div class="layout">

  <div class="carousel-area">
    <div class="drone-track" id="droneTrack">

      <div class="drone-card" data-index="0" id="card-0">
        <div class="drone-img-wrap">
          <img src="assets/images/BFD-X.jpg" alt="BFD-X"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="drone-placeholder" style="display:none">
            <svg width="40" height="40" fill="none" viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" stroke="#5a6070" stroke-width="1.5"/>
              <path d="M20 8v24M8 20h24" stroke="#5a6070" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="4" fill="#5a6070"/>
            </svg>
            <p>BFD-X</p>
          </div>
        </div>
        <div class="drone-label">
          <div class="drone-label-name">BFD-X</div>
          <div class="drone-label-type">Heavy Lift Quadrotor</div>
        </div>
      </div>

      <div class="drone-card" data-index="1" id="card-1">
        <div class="drone-img-wrap">
          <div class="drone-placeholder">
            <svg width="40" height="40" fill="none" viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" stroke="#5a6070" stroke-width="1.5"/>
              <path d="M20 8v24M8 20h24" stroke="#5a6070" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="4" fill="#5a6070"/>
            </svg>
            <p>VHAGAR</p>
          </div>
        </div>
        <div class="drone-label">
          <div class="drone-label-name">Vhagar</div>
          <div class="drone-label-type">Fixed-Wing VTOL</div>
        </div>
      </div>

      <div class="drone-card" data-index="2" id="card-2">
        <div class="drone-img-wrap">
          <div class="drone-placeholder">
            <svg width="40" height="40" fill="none" viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" stroke="#5a6070" stroke-width="1.5"/>
              <path d="M20 8v24M8 20h24" stroke="#5a6070" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="20" cy="20" r="4" fill="#5a6070"/>
            </svg>
            <p>T40</p>
          </div>
        </div>
        <div class="drone-label">
          <div class="drone-label-name">T40</div>
          <div class="drone-label-type">Agricultural Sprayer</div>
        </div>
      </div>

    </div>

    <div class="nav-arrows">
      <button class="nav-btn" id="btnPrev">&#8592;</button>
      <button class="nav-btn" id="btnNext">&#8594;</button>
    </div>

    <div class="dot-indicators" id="dotIndicators">
      <div class="dot" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
    </div>
  </div>

  <div class="spec-panel">
    <div id="panelEmpty" class="panel-empty">
      <svg width="44" height="44" fill="none" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="20" stroke="#1a1f2e" stroke-width="1.5"/>
        <path d="M14 22h16M22 14l8 8-8 8" stroke="#5a6070" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Klik salah satu drone untuk melihat spesifikasi dan detail assembly.</p>
    </div>
    <div id="panelData">
      <div class="panel-top">
        <div class="panel-eyebrow" id="pEyebrow"></div>
        <div class="panel-drone-name" id="pName"></div>
        <div class="panel-drone-class" id="pClass"></div>
      </div>
      <div class="panel-body">
        <p class="panel-desc" id="pDesc"></p>
        <div class="spec-group-label">Spesifikasi Utama</div>
        <div class="spec-grid" id="pGrid"></div>
        <a class="detail-btn" id="pDetailBtn" href="#">
          <span>Lihat Detail Assembly</span>
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

</div>

<script>
  const drones = [
    {
      id: 'bfd-x',
      name: 'BFD-X',
      class: 'Heavy Lift Quadrotor',
      eyebrow: 'Flagship Platform',
      desc: 'Platform quadrotor heavy-lift dirancang untuk misi survei, inspeksi, dan pengiriman beban. Struktur carbon fiber dengan sistem modular memungkinkan konfigurasi payload yang fleksibel di berbagai kondisi operasional.',
      specs: [
        { label: 'MTOW',        value: '12 kg' },
        { label: 'Max Payload', value: '3.5 kg' },
        { label: 'Flight Time', value: '35 min' },
        { label: 'Range',       value: '8 km' },
        { label: 'Frame Size',  value: '840 mm' },
        { label: 'IP Rating',   value: 'IP53' },
      ],
      detailPage: 'pages/bfd-x.html'
    },
    {
      id: 'vhagar',
      name: 'Vhagar',
      class: 'Fixed-Wing VTOL',
      eyebrow: 'Long Endurance',
      desc: 'Platform VTOL hybrid yang menggabungkan kemampuan take-off vertikal dengan efisiensi terbang sayap tetap. Ideal untuk misi pemetaan area luas dan pengintaian jarak jauh dengan waktu terbang yang panjang.',
      specs: [
        { label: 'MTOW',        value: '— kg' },
        { label: 'Max Payload', value: '— kg' },
        { label: 'Flight Time', value: '— min' },
        { label: 'Range',       value: '— km' },
        { label: 'Wingspan',    value: '— mm' },
        { label: 'IP Rating',   value: '—' },
      ],
      detailPage: 'pages/vhagar.html'
    },
    {
      id: 't40',
      name: 'T40',
      class: 'Agricultural Sprayer',
      eyebrow: 'Agri Platform',
      desc: 'Drone pertanian bertenaga tinggi untuk penyemprotan presisi di lahan pertanian. Sistem pompa dan nozzle yang terintegrasi memastikan distribusi cairan merata pada berbagai jenis tanaman.',
      specs: [
        { label: 'MTOW',          value: '— kg' },
        { label: 'Tank Capacity', value: '— L' },
        { label: 'Spray Width',   value: '— m' },
        { label: 'Coverage',      value: '— ha/h' },
        { label: 'Frame Size',    value: '— mm' },
        { label: 'IP Rating',     value: '—' },
      ],
      detailPage: 'pages/t40.html'
    }
  ];

  let centerIndex = 0;

  const cards = [
    document.getElementById('card-0'),
    document.getElementById('card-1'),
    document.getElementById('card-2'),
  ];
  const dots = document.querySelectorAll('.dot');

  function getPos(cardIndex) {
    const diff = (cardIndex - centerIndex + 3) % 3;
    if (diff === 0) return 'pos-center';
    if (diff === 1) return 'pos-right';
    return 'pos-left';
  }

  function renderCarousel() {
    cards.forEach((card, i) => {
      card.className = 'drone-card ' + getPos(i);
    });
    dots.forEach((d, i) => d.classList.toggle('active', i === centerIndex));
  }

  function showPanel(droneIndex) {
    const d = drones[droneIndex];
    document.getElementById('panelEmpty').style.display = 'none';
    const pd = document.getElementById('panelData');
    pd.style.display = 'flex';

    document.getElementById('pEyebrow').textContent = d.eyebrow;
    document.getElementById('pName').textContent = d.name;
    document.getElementById('pClass').textContent = d.class;
    document.getElementById('pDesc').textContent = d.desc;
    document.getElementById('pDetailBtn').href = d.detailPage;
    document.getElementById('pGrid').innerHTML = d.specs.map(s => `
      <div class="spec-item">
        <div class="spec-item-label">${s.label}</div>
        <div class="spec-item-value">${s.value}</div>
      </div>
    `).join('');
  }

  cards.forEach((card, i) => {
    card.addEventListener('click', () => {
      centerIndex = i;
      renderCarousel();
      showPanel(i);
    });
  });

  dots.forEach(d => {
    d.addEventListener('click', () => {
      centerIndex = parseInt(d.dataset.i);
      renderCarousel();
      showPanel(centerIndex);
    });
  });

  document.getElementById('btnPrev').addEventListener('click', () => {
    centerIndex = (centerIndex - 1 + 3) % 3;
    renderCarousel();
    showPanel(centerIndex);
  });
  document.getElementById('btnNext').addEventListener('click', () => {
    centerIndex = (centerIndex + 1) % 3;
    renderCarousel();
    showPanel(centerIndex);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  document.getElementById('btnPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
  });

  renderCarousel();
  showPanel(0);
</script>
</body>
</html>
