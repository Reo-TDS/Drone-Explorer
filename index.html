<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFD-X — Drone Design Explorer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --border: #1e2330;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --text: #e8eaf0;
      --muted: #6b7280;
      --panel-w: 320px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,12,16,0.95);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN LAYOUT ── */
    .layout {
      display: flex;
      height: calc(100vh - 61px);
    }

    /* ── CANVAS AREA ── */
    .canvas-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 30px;
    }

    .instruction {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .drone-container {
      position: relative;
      width: 580px;
      max-width: 100%;
    }

    .drone-container img {
      width: 100%;
      display: block;
      filter: invert(1) brightness(0.85);
      user-select: none;
      pointer-events: none;
    }

    /* ── HOTSPOT ZONES ── */
    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.25s ease;
    }

    .hotspot-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .hotspot:hover .hotspot-ring,
    .hotspot.active .hotspot-ring {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent), 0 0 40px rgba(0,212,255,0.2);
      animation: pulse-ring 1.4s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 1; }
      70%  { transform: scale(1.4); opacity: 0; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .hotspot-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      position: relative; z-index: 2;
      transition: transform 0.2s ease;
    }
    .hotspot:hover .hotspot-dot,
    .hotspot.active .hotspot-dot {
      transform: scale(1.3);
      background: #fff;
    }

    /* hotspot label */
    .hotspot-label {
      position: absolute;
      white-space: nowrap;
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .hotspot:hover .hotspot-label,
    .hotspot.active .hotspot-label {
      opacity: 1;
    }

    /* ── INDIVIDUAL HOTSPOT POSITIONS ── */
    /* Center plate — body of drone */
    #hs-center  { top: 34%; left: 40%; }
    #hs-center .hotspot-label  { top: -22px; left: 50%; transform: translateX(-50%); }

    /* CW arm — right arm */
    #hs-cw      { top: 40%; left: 72%; }
    #hs-cw .hotspot-label      { top: -22px; left: 16px; }

    /* CCW arm — left arm */
    #hs-ccw     { top: 40%; left: 14%; }
    #hs-ccw .hotspot-label     { top: -22px; right: 16px; }

    /* Landing skid — bottom legs */
    #hs-skid    { top: 75%; left: 44%; }
    #hs-skid .hotspot-label    { bottom: -22px; left: 50%; transform: translateX(-50%); }

    /* Payload — top antenna area */
    #hs-payload { top: 10%; left: 50%; }
    #hs-payload .hotspot-label { top: -22px; left: 16px; }

    /* ── GRID LINES (techy overlay) ── */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      border-radius: 4px;
    }

    /* ── SIDE PANEL ── */
    .panel {
      width: var(--panel-w);
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.35s ease;
    }

    .panel-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
    }

    .panel-eyebrow {
      font-size: 0.62rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .panel-title {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .panel-desc {
      font-size: 0.88rem;
      line-height: 1.7;
      color: #b0b5c0;
      margin-bottom: 24px;
    }

    .spec-table {
      width: 100%;
      border-collapse: collapse;
    }
    .spec-table tr {
      border-bottom: 1px solid var(--border);
    }
    .spec-table tr:last-child { border-bottom: none; }
    .spec-table td {
      padding: 10px 0;
      font-size: 0.82rem;
    }
    .spec-table td:first-child {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      width: 45%;
    }
    .spec-table td:last-child {
      color: var(--text);
      font-weight: 500;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 20px;
    }
    .tag {
      padding: 4px 10px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 100px;
      font-size: 0.68rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    /* empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p {
      font-size: 0.8rem;
      line-height: 1.6;
      letter-spacing: 0.04em;
    }

    /* section divider */
    .section-label {
      font-size: 0.62rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    /* accent bar */
    .accent-bar {
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin-bottom: 20px;
      width: 60%;
    }

    /* nav dots */
    .nav-dots {
      display: flex;
      gap: 8px;
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .nav-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    @media (max-width: 860px) {
      .layout { flex-direction: column; height: auto; }
      .panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      header { padding: 14px 20px; }
      .drone-container { width: 100%; max-width: 460px; }
      .canvas-wrap { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">BFD<span>-X</span></div>
    <div class="subtitle">Drone Design Explorer</div>
  </div>
  <div class="subtitle">Interactive Assembly Map</div>
</header>

<div class="layout">

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <div class="instruction">Klik sub-assembly untuk melihat detail komponen</div>

    <div class="drone-container">
      <div class="grid-overlay"></div>
      <img src="BFD-X.jpg" alt="BFD-X Drone" />

      <!-- HOTSPOTS -->
      <div class="hotspot" id="hs-center" data-id="center" title="Center Plate Assembly">
        <div class="hotspot-ring"></div>
        <div class="hotspot-dot"></div>
        <div class="hotspot-label">Center Plate</div>
      </div>

      <div class="hotspot" id="hs-cw" data-id="cw" title="CW Arm Assembly">
        <div class="hotspot-ring"></div>
        <div class="hotspot-dot"></div>
        <div class="hotspot-label">CW Arm</div>
      </div>

      <div class="hotspot" id="hs-ccw" data-id="ccw" title="CCW Arm Assembly">
        <div class="hotspot-ring"></div>
        <div class="hotspot-dot"></div>
        <div class="hotspot-label">CCW Arm</div>
      </div>

      <div class="hotspot" id="hs-skid" data-id="skid" title="Landing Skid Assembly">
        <div class="hotspot-ring"></div>
        <div class="hotspot-dot"></div>
        <div class="hotspot-label">Landing Skid</div>
      </div>

      <div class="hotspot" id="hs-payload" data-id="payload" title="Payload System Assembly">
        <div class="hotspot-ring"></div>
        <div class="hotspot-dot"></div>
        <div class="hotspot-label">Payload System</div>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="panel">
    <div class="panel-header" id="panel-header" style="display:none">
      <div class="panel-eyebrow" id="panel-eyebrow">Sub-Assembly</div>
      <div class="panel-title" id="panel-title">—</div>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="22" stroke="#6b7280" stroke-width="1.5"/>
          <path d="M24 14v10M24 30v4" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Pilih salah satu titik pada gambar drone untuk melihat informasi detail sub-assembly.</p>
      </div>
    </div>
    <div class="nav-dots" id="nav-dots" style="display:none">
      <div class="nav-dot" data-id="center"></div>
      <div class="nav-dot" data-id="cw"></div>
      <div class="nav-dot" data-id="ccw"></div>
      <div class="nav-dot" data-id="skid"></div>
      <div class="nav-dot" data-id="payload"></div>
    </div>
  </div>
</div>

<script>
  const assemblies = {
    center: {
      eyebrow: "01 — Struktur Utama",
      title: "Center Plate Assembly",
      desc: "Komponen inti dari drone BFD-X yang berfungsi sebagai tulang punggung struktural. Center plate menghubungkan seluruh sub-assembly dan menampung sistem avionik, baterai, serta flight controller. Desain honeycomb memberikan kekuatan tinggi dengan bobot minimal.",
      specs: [
        ["Material", "Carbon Fiber Composite"],
        ["Dimensi", "280 × 280 mm"],
        ["Ketebalan", "3 mm"],
        ["Mounting Hole", "M3 × 16 titik"],
        ["Kapasitas Baterai", "2× LiPo 6S"],
        ["IP Rating", "IP53"],
      ],
      tags: ["Structural", "Avionics Bay", "Modular", "Carbon Fiber"]
    },
    cw: {
      eyebrow: "02 — Propulsi CW",
      title: "CW Arm Assembly",
      desc: "Lengan motor untuk propeler arah Clockwise (searah jarum jam). Arm ini dipasang secara diametral dan dirancang untuk menyerap vibrasi motor. Termasuk ESC mount, kabel management channel, dan motor bracket quick-release.",
      specs: [
        ["Rotasi Motor", "Clockwise (CW)"],
        ["Panjang Arm", "420 mm"],
        ["Diameter Tube", "25 mm"],
        ["Material", "Carbon Fiber Tube"],
        ["Motor Mount", "M3 × 4 baut"],
        ["Max Thrust", "4.2 kg per motor"],
      ],
      tags: ["CW Rotation", "ESC Mount", "Quick-Release", "Vibration Damped"]
    },
    ccw: {
      eyebrow: "03 — Propulsi CCW",
      title: "CCW Arm Assembly",
      desc: "Lengan motor untuk propeler arah Counter-Clockwise (berlawanan jarum jam). Berpasangan dengan CW arm untuk menciptakan keseimbangan torsi pada frame. Sistem mounting identik dengan CW arm untuk kemudahan penggantian di lapangan.",
      specs: [
        ["Rotasi Motor", "Counter-CW (CCW)"],
        ["Panjang Arm", "420 mm"],
        ["Diameter Tube", "25 mm"],
        ["Material", "Carbon Fiber Tube"],
        ["Motor Mount", "M3 × 4 baut"],
        ["Max Thrust", "4.2 kg per motor"],
      ],
      tags: ["CCW Rotation", "ESC Mount", "Quick-Release", "Torque Balance"]
    },
    skid: {
      eyebrow: "04 — Sistem Pendaratan",
      title: "Landing Skid Assembly",
      desc: "Sistem landing gear berbentuk skid yang dirancang untuk pendaratan di berbagai medan. Struktur tubular dengan cross-brace memberikan stabilitas lateral. Ujung skid dilengkapi rubber pad untuk meredam benturan saat touchdown.",
      specs: [
        ["Konfigurasi", "4-point skid"],
        ["Tinggi Ground Clearance", "180 mm"],
        ["Material", "Aluminum 6061-T6"],
        ["Diameter Tube", "16 mm"],
        ["Max Landing Weight", "12 kg"],
        ["Rubber Pad", "Shore 60A"],
      ],
      tags: ["Aluminum", "All-Terrain", "Shock Absorb", "Removable"]
    },
    payload: {
      eyebrow: "05 — Sistem Misi",
      title: "Payload System Assembly",
      desc: "Sistem mounting payload yang fleksibel untuk berbagai misi. Tersedia interface untuk kamera, sensor, maupun delivery system. Dilengkapi vibration isolator untuk menjaga kualitas data sensor. Koneksi listrik dan data melalui connector terpusat di center plate.",
      specs: [
        ["Max Payload Weight", "3.5 kg"],
        ["Interface", "Picatinny + M5 thread"],
        ["Power Output", "12V / 5V / USB-C"],
        ["Data Port", "CAN / UART / I2C"],
        ["Gimbal Ready", "3-axis support"],
        ["Quick Release", "Tool-free"],
      ],
      tags: ["Modular", "Gimbal Ready", "Multi-sensor", "Quick-Release"]
    }
  };

  let activeId = null;

  function showPanel(id) {
    const data = assemblies[id];
    if (!data) return;

    activeId = id;

    // update hotspots
    document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
    document.querySelector(`[data-id="${id}"].hotspot`).classList.add('active');

    // update nav dots
    document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
    document.querySelector(`.nav-dot[data-id="${id}"]`).classList.add('active');

    // show header
    const header = document.getElementById('panel-header');
    header.style.display = 'block';
    document.getElementById('panel-eyebrow').textContent = data.eyebrow;
    document.getElementById('panel-title').textContent = data.title;

    // show nav
    document.getElementById('nav-dots').style.display = 'flex';

    // hide empty state
    document.getElementById('empty-state').style.display = 'none';

    // build body
    const body = document.getElementById('panel-body');
    body.innerHTML = `
      <div class="accent-bar"></div>
      <p class="panel-desc">${data.desc}</p>
      <div class="section-label">Spesifikasi Teknis</div>
      <table class="spec-table">
        ${data.specs.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>
      <div class="section-label">Tags</div>
      <div class="tag-list">
        ${data.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    `;
  }

  // Hotspot click handlers
  document.querySelectorAll('.hotspot').forEach(hs => {
    hs.addEventListener('click', () => showPanel(hs.dataset.id));
  });

  // Nav dot click handlers
  document.querySelectorAll('.nav-dot').forEach(dot => {
    dot.addEventListener('click', () => showPanel(dot.dataset.id));
  });
</script>
</body>
</html>
